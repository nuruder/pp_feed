<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PadelPoint Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-row">
                <button id="btn-back" class="btn-icon" style="display:none" onclick="App.back()">&larr;</button>
                <h1 id="page-title">Каталог</h1>
                <button id="btn-cart" class="btn-icon" onclick="App.navigate('cart')">
                    <span class="cart-icon">&#128722;</span>
                    <span id="cart-badge" class="badge" style="display:none">0</span>
                </button>
            </div>
            <div id="search-bar" class="search-bar">
                <input type="text" id="search-input" placeholder="Поиск товаров..." oninput="App.onSearch(this.value)">
            </div>
        </header>

        <!-- Content -->
        <main id="content"></main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/product.js"></script>
    <script src="js/order.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
